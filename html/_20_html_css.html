<!DOCTYPE html>

<html>

    <head>
        <!-- <base> 标签描述了基本的链接地址/链接目标，该标签作为HTML文档中所有的链接标签的默认链接 -->
        <base href="http://www.hardstone.org/base_url/" target="_blank">
        
        <!-- 外部样式 -->
        <link rel="stylesheet" type="text/css" href="custom_style.css">
        
        <!-- 内部样式 -->
        <style type="text/css">
            body {
                background-color: rgb(209, 212, 25);
            }
            p {
                color: blue;
            }
        </style>

        <meta name="description" content="free web coding">
        <meta name="author" content="hardstone">

    </head>

    <body>
        <!-- opacity 不透明度 -->
        <!-- position 定位方式 -->
        <div style="opacity: 0.5;position: absolute;left: 50px;width: 300px;height: 150px;background-color: #40B3DF;"></div>
        <div style="font-family: Verdana, Geneva, Tahoma, sans-serif;padding:20px;border-radius: 10px;border: 10px solid #EE872A;"></div>
        <div style="opacity: 0.3;position: absolute;left: 120px;width: 100px;height: 200px;background-color:#8AC007 ;"></div>
        
        <h3>Look! Style and colors</h3>

        <div style="letter-spacing: 12px;">Manipulate Text</div>
        <div style="color: #40B3DF;">Colors<span style="background-color: #B4009E;color: #FFFFFF;">Boxes</span></div>
        <div style="color: #000000;">and more...</div>
    </body>

</html>
