<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta name="author" content="hardstone">
    </head>

    <body>
        <!-- 块级元素，通常会以新的一行开始或结束 -->
        <h1></h1>
        <p></p>
        <ul></ul>
        <table></table>

        <!-- 内联元素，通常不会以新的一行开始 -->
        <b></b>
        <td></td>
        <a></a>
        <img>

        <!-- HTML <div> 元素是块级元素，它可用于组合其他 HTML 元素的容器。
            <div> 元素没有特定的含义。除此之外，由于它属于块级元素，浏览器会在其前后显示折行。
            如果与 CSS 一同使用，<div> 元素可用于对大的内容块设置样式属性。
            <div> 元素的另一个常见的用途是文档布局。它取代了使用表格定义布局的老式方法。 -->
        
        <div></div>

        <!-- HTML <span> 元素是内联元素，可用作文本的容器
            <span> 元素也没有特定的含义。
            当与 CSS 一同使用时，<span> 元素可用于为部分文本设置样式属性。 -->
        <span></span>

        <!-- div 页面布局 -->
        <div id="container" style="width: 98%; height: 98%;">
            <div id="header" style="background-color: #FFA500;">
                <h1 style="margin-bottom: 0;">DeepSeek</h1>

                <div id="menu" style="background-color: #FFD700;height: 200px;width: 100%;float: left;">
                    <b>菜单</b><br/>HTML<br/>JavaScript<br/>
                    <div id="content" style="position: relative; width: 100%;background-color: #FFA500;clear:both;text-align: center;">版权 © hardstone.org</div>
                </div>
            </div>
        </div>

        <!-- table 页面布局 -->
        <table width="98%" border="0" align="center">
            <caption>deepseek</caption>
            <tr>
                <td colspan="2" style="width: 98% ;height: 10%;;background-color: #FFA500;">
                    <h1 style="color: azure; size: 20px;">
                        DeepSeek
                    </h1>
                </td>
            </tr>
            <tr>
                <td style="background-color: #FFD700;width: 20%; vertical-align: top;">
                    <b>
                        <ol>
                            <li>菜单</li>
                            <li>HTML</li>
                            <li>JS</li>
                            <li>CSS</li>
                        </ol>
                    </b>
                </td>
                <td>
                    hello, world!
                </td>
            </tr>
            <tr>
                <td colspan="2" style="background-color: #FFA500; height: 5%;">
                    版权 © www.hardstone.org
                </td>
            </tr>
        </table>
    </body>
</html>
