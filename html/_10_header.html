<!DOCTYPE html>

<html>

    <head>
        <!-- <base> 标签描述了基本的链接地址/链接目标，该标签作为HTML文档中所有的链接标签的默认链接 -->
        <base href="http://www.hardstone.org/base_url/" target="_blank">
        <!-- <link> 标签定义了文档与外部资源之间的关系。 -->
        <!-- rel  **必需** 定义当前文档与链接资源之间的关系（关系类型）。不同的 rel 值会触发不同的浏览器行为，如 stylesheet、icon、preload 等。-->
        <!-- href 指定资源的 URL（绝对或相对路径） -->
        <!-- type 指定资源的 MIME 类型。在 HTML5 中对于 rel="stylesheet" 通常可省略（默认为 text/css） -->
        <link rel="stylesheet" type="text/css" href="custom_style.css">

        <!-- <style> 标签定义了HTML文档的样式文件引用地址. -->
        <!-- 在<style> 元素中你也可以直接添加样式来渲染 HTML 文档 -->
        <style type="text/css">
            body {
                background-color: rgb(209, 212, 25);
            }
            p {
                color: blue;
            }
        </style>

        <meta name="description" content="free web coding">
        <meta name="author" content="hardstone">

    </head>

</html>
