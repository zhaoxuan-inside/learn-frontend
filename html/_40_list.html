<!DOCTYPE html>

<html>

    <head>
        <meta charset="utf-8">
        <meta name="author" content="hardstone">
    </head>

    <body>
        <!-- 无需列表 -->
        <ul style="list-style-type:circle">
            <li>zhangsan</li>
            <li>lisi</li>
            <li>wangwu</li>
        </ul>

        <!-- 有序列表 -->
        <!-- type 用来定义有序列表的起始编号 -->
        <ol type="I">
            <li>No.1</li>
            <li>No.2</li>
            <li>No.3</li>
        </ol>

        <!-- 自定义列表 -->
        <dl>
            <dt>Coffee</dt>
            <dd>- black hot drink</dd>
            <dt>Milk</dt>
            <dd>- white cold drink</dd>
        </dl>
    </body>
</html>
